services:
  - type: web
    name: fonat
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: RUNTIME_PROFILE
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: PUBLIC_APP_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: MONGODB_DB
        value: fonat
      - key: FEATURE_PROJECTS
        value: false
      - key: ASSET_PROFILE
        value: hosted-restricted
