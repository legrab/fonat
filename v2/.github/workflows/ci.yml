name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  classify:
    runs-on: ubuntu-latest
    outputs:
      assessment: ${{ steps.paths.outputs.assessment }}
      planning: ${{ steps.paths.outputs.planning }}
      live: ${{ steps.paths.outputs.live }}
      content: ${{ steps.paths.outputs.content }}
      deployment: ${{ steps.paths.outputs.deployment }}
      broad: ${{ steps.paths.outputs.broad }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }
      - id: paths
        shell: bash
        run: |
          CHANGED="$(git diff --name-only HEAD^ HEAD 2>/dev/null || git ls-files)"
          flag() { if echo "$CHANGED" | grep -Eq "$2"; then echo "$1=true" >> "$GITHUB_OUTPUT"; else echo "$1=false" >> "$GITHUB_OUTPUT"; fi; }
          flag assessment 'assessment|submission|evidence|modules/math|packages/domain'
          flag planning 'lesson|planning|curriculum|blueprint|packages/domain'
          flag live 'live-session|presentation|StudentJoin|PresentationPage|packages/domain'
          flag content 'content-contract|content-cli|packages/stage|packages/apply|content/'
          flag deployment 'Dockerfile|docker-compose|vercel|render|apps/server/src/runtime'
          flag broad 'packages/contracts|packages/domain|apps/server/src/repository|package-lock.json|tsconfig|eslint'

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci --ignore-scripts
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=critical

  integration:
    needs: [classify, validate]
    if: needs.classify.outputs.broad == 'true' || needs.classify.outputs.assessment == 'true' || needs.classify.outputs.planning == 'true' || needs.classify.outputs.live == 'true' || needs.classify.outputs.content == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci --ignore-scripts
      - run: npm run test:integration

  deployment-smoke:
    needs: [classify, validate]
    if: needs.classify.outputs.broad == 'true' || needs.classify.outputs.deployment == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: docker build -t fonat-ci .
