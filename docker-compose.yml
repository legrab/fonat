services:
  mongodb:
    image: mongo:8.0
    command: ['mongod', '--replSet', 'rs0', '--bind_ip_all']
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - fonat-mongo:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20
  mongo-init:
    image: mongo:8.0
    depends_on:
      mongodb:
        condition: service_healthy
    restart: 'no'
    entrypoint:
      [
        'bash',
        '-lc',
        'mongosh --host mongodb:27017 --eval ''try { rs.status() } catch (e) { rs.initiate({_id:"rs0",members:[{_id:0,host:"mongodb:27017"}]}) }'''
      ]
  fonat:
    build: .
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      WEB_ORIGIN: http://localhost:3000
      PUBLIC_BASE_URL: http://localhost:3000
      MONGODB_URI: mongodb://mongodb:27017/?replicaSet=rs0
      MONGODB_DB: fonat
      SESSION_SECRET: ${SESSION_SECRET:-replace-this-development-secret-please}
      PERSISTENCE_MODE: mongo
      ASSET_PROFILE: local-rich
      LOCAL_ASSET_DIR: /app/local-assets
    volumes:
      - fonat-assets:/app/local-assets
volumes:
  fonat-mongo:
  fonat-assets:
